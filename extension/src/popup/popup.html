<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f23;
      color: #e0e0e0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .header img { width: 28px; height: 28px; }
    .header h1 { font-size: 16px; color: #00d4ff; }
    .status-card {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #2a2a4a;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 13px;
    }
    .status-row .label { color: #888; }
    .status-active { color: #00e676; }
    .status-inactive { color: #ff5252; }
    .dashboard-link {
      display: block;
      text-align: center;
      margin-top: 12px;
      padding: 10px;
      background: #16213e;
      color: #00d4ff;
      text-decoration: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .dashboard-link:hover { background: #1a3a5c; }
  </style>
</head>
<body>
  <div class="header">
    <h1>CurbAI Monitor</h1>
  </div>

  <div class="status-card">
    <div class="status-row">
      <span class="label">Status</span>
      <span id="monitoring-status" class="status-active">● Active</span>
    </div>
    <div class="status-row">
      <span class="label">Device ID</span>
      <span id="device-id">—</span>
    </div>
    <div class="status-row">
      <span class="label">Connection</span>
      <span id="connection-status" class="status-inactive">Disconnected</span>
    </div>
    <div class="status-row">
      <span class="label">Buffered Events</span>
      <span id="buffer-count">0</span>
    </div>
  </div>

  <a class="dashboard-link" href="#" id="dashboard-link">Open Dashboard →</a>

  <script src="popup.js"></script>
</body>
</html>
